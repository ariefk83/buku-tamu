<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buku Tamu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1000px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-bottom: 4px solid #fff;
        }

        .header h1 {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            padding: 40px;
        }

        .form-section h2 {
            font-size: 20px;
            color: #333;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-section h2::before {
            content: '✎';
            font-size: 24px;
            color: #667eea;
        }

        .form-group {
            margin-bottom: 20px;
            animation: slideInLeft 0.6s ease-out;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-simpan {
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-simpan:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-simpan:active {
            transform: translateY(0);
        }

        .list-section h2 {
            font-size: 20px;
            color: #333;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .list-section h2::before {
            content: '📋';
            font-size: 24px;
        }

        .guest-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .guest-list::-webkit-scrollbar {
            width: 6px;
        }

        .guest-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .guest-list::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .guest-item {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideInRight 0.5s ease-out;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .guest-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }

        .guest-info {
            flex: 1;
        }

        .guest-name {
            font-weight: 700;
            color: #333;
            font-size: 15px;
            margin-bottom: 4px;
        }

        .guest-id {
            color: #666;
            font-size: 13px;
        }

        .guest-id-label {
            color: #999;
            font-size: 12px;
            text-transform: uppercase;
            margin-right: 5px;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 30px 20px;
            font-style: italic;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .header h1 {
                font-size: 36px;
            }

            .guest-list {
                max-height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Buku Tamu</h1>
        </div>

        <div class="content">
            <!-- Form Section -->
            <div class="form-section">
                <h2>Tambah Pengunjung</h2>
                <form id="guestForm">
                    <div class="form-group">
                        <label for="nama">Nama</label>
                        <input 
                            type="text" 
                            id="nama" 
                            placeholder="Masukkan nama Anda"
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label for="id">Nomor ID</label>
                        <input 
                            type="text" 
                            id="id" 
                            placeholder="Masukkan nomor ID"
                            required
                        >
                    </div>
                    <button type="submit" class="btn-simpan">Simpan</button>
                </form>
            </div>

            <!-- List Section -->
            <div class="list-section">
                <h2>Daftar Pengunjung</h2>
                <div class="guest-list" id="guestList">
                    <div class="empty-state">Belum ada pengunjung</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('guestForm');
        const guestList = document.getElementById('guestList');
        const namaInput = document.getElementById('nama');
        const idInput = document.getElementById('id');

        // Load data dari localStorage saat halaman dimuat
        loadGuests();

        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const nama = namaInput.value.trim();
            const id = idInput.value.trim();

            if (nama && id) {
                addGuest(nama, id);
                form.reset();
                namaInput.focus();
            }
        });

        function addGuest(nama, id) {
            // Ambil data yang ada
            let guests = getGuests();
            
            // Tambah guest baru
            guests.unshift({ nama, id, timestamp: new Date().getTime() });
            
            // Simpan ke localStorage
            localStorage.setItem('guests', JSON.stringify(guests));
            
            // Update tampilan
            loadGuests();
        }

        function getGuests() {
            const data = localStorage.getItem('guests');
            return data ? JSON.parse(data) : [];
        }

        function loadGuests() {
            const guests = getGuests();
            guestList.innerHTML = '';

            if (guests.length === 0) {
                guestList.innerHTML = '<div class="empty-state">Belum ada pengunjung</div>';
                return;
            }

            guests.forEach((guest, index) => {
                const guestItem = document.createElement('div');
                guestItem.className = 'guest-item';
                guestItem.innerHTML = `
                    <div class="guest-info">
                        <div class="guest-name">${escapeHtml(guest.nama)}</div>
                        <div class="guest-id">
                            <span class="guest-id-label">ID:</span>${escapeHtml(guest.id)}
                        </div>
                    </div>
                `;
                guestList.appendChild(guestItem);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
